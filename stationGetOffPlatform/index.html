<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
      body { 
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
        background-color: #f0f2f5; 
        margin: 0;
        padding: 0; 
        display: flex; 
        justify-content: center;
      }

      /* 横幅をさらに拡大 (480px -> 540px) */
      .card { 
        width: 96%; 
        max-width: 540px; 
        background: white; 
        padding: 40px 30px; 
        box-sizing: border-box;
        margin-top: 25px;
        margin-bottom: 25px;
        border-radius: 24px;
        box-shadow: 0 12px 35px rgba(0,0,0,0.15);
      }

      h2 { 
        color: #005bac; 
        text-align: center; 
        margin: 0 0 35px 0; 
        border-bottom: 6px solid #005bac; 
        padding-bottom: 15px; 
        font-size: 32px; /* タイトルをさらに強調 */
      }
      
      .field { margin-bottom: 30px; }
      
      label { 
        display: block; 
        margin-bottom: 12px; 
        font-weight: bold; 
        font-size: 24px; /* ラベルもさらに大きく */
        color: #222; 
      }
      
      select { 
        width: 100%; 
        padding: 20px 15px; 
        border: 4px solid #005bac; 
        border-radius: 16px; 
        font-size: 28px; /* セレクトボックスの文字を特大化 */
        background-color: #fff; 
        box-sizing: border-box;
        color: #000;
        font-weight: bold;
        -webkit-appearance: menulist; 
      }

      button { 
        width: 100%; 
        padding: 24px; 
        background-color: #005bac; 
        color: white; 
        border: none; 
        border-radius: 16px; 
        font-size: 32px; /* ボタン文字をさらに大きく */
        font-weight: bold; 
        cursor: pointer; 
        margin-top: 15px; 
        box-shadow: 0 6px 18px rgba(0,0,0,0.2);
        transition: all 0.1s ease;
      }
      
      button:active { 
        background-color: #003a6e; 
        transform: scale(0.96);
      }
      
      button:disabled { background-color: #ccc; }

      #result { 
        margin-top: 35px; 
        padding: 30px; 
        border-radius: 16px; 
        background-color: #fffaf0; 
        border: 4px solid #ff9800; 
        display: none; 
        font-size: 26px; /* 結果の文字もさらに大きく */
        line-height: 1.7;
        color: #000;
        font-weight: bold;
        word-wrap: break-word;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Station get off Platform</h2>
      
      <div class="field">
        <label>乗る駅 (Departure)</label>
        <select id="depSelect"><option>読み込み中...</option></select>
      </div>
      
      <div class="field">
        <label>降りる駅 (Arrival)</label>
        <select id="arrSelect"><option>読み込み中...</option></select>
      </div>
      
      <div class="field">
        <label>車両数 (Cars)</label>
        <select id="carSelect"><option>読み込み中...</option></select>
      </div>
      
      <button onclick="search()" id="btn">検索実行</button>
      
      <div id="result"></div>
    </div>

    <script>
      window.onload = function() {
        google.script.run.withSuccessHandler(function(data) {
          fillSelect('depSelect', data.stations);
          fillSelect('arrSelect', data.stations);
          fillSelect('carSelect', data.cars, "両");
        }).getInitialData();
      };

      function fillSelect(id, items, suffix = "") {
        const sel = document.getElementById(id);
        sel.innerHTML = "";
        items.forEach(text => {
          const opt = document.createElement('option');
          opt.value = text;
          opt.textContent = text + suffix;
          sel.appendChild(opt);
        });
      }

      function search() {
        const btn = document.getElementById('btn');
        const resDiv = document.getElementById('result');
        btn.disabled = true;
        btn.textContent = "検索中...";
        resDiv.style.display = "none";

        const params = {
          dep: document.getElementById('depSelect').value,
          arr: document.getElementById('arrSelect').value,
          car: document.getElementById('carSelect').value
        };

        google.script.run.withSuccessHandler(function(html) {
          resDiv.innerHTML = html;
          resDiv.style.display = "block";
          btn.disabled = false;
          btn.textContent = "検索実行";
        }).executeSearch(params);
      }
    </script>
  </body>
</html>
